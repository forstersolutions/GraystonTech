<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title">
  <title id="title">Grayston Technologies GP monogram</title>
  <defs>
    <linearGradient id="frame" x1="18" y1="10" x2="112" y2="118" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9af0ff"/>
      <stop offset=".48" stop-color="#2a3034"/>
      <stop offset="1" stop-color="#ffbd62"/>
    </linearGradient>
    <linearGradient id="gStroke" x1="18" y1="28" x2="88" y2="104" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9ef2ff"/>
